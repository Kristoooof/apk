name: EP2PC Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Ez lehetővé teszi, hogy gombnyomásra is indítsd

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # Ez egy tiszta Linux szerver a GitHub felhőjében

    steps:
    - name: Kód letöltése
      uses: actions/checkout@v4

    - name: Java és Android SDK telepítése
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: 34.0.0

    - name: Rust telepítése
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Cargo-NDK telepítése
      run: cargo install cargo-ndk

    - name: Rust Core fordítása Androidra
      working-directory: ./core
      run: cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

    - name: Jogosultság adása a Gradle-nek
      working-directory: ./android
      run: chmod +x ./gradlew

    - name: APK összeállítása
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: APK feltöltése letöltésre
      uses: actions/upload-artifact@v4
      with:
        name: ep2pc-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
